<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.C.O - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Diagonal lines effect */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.05),
                rgba(255, 255, 255, 0.05) 1px,
                transparent 1px,
                transparent 20px
            );
            transform: rotate(-15deg);
            z-index: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
            z-index: 1;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background-color: #3498db;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px;
            color: white;
            font-size: 30px;
            position: relative;
        }

        .logo-icon::after {
            content: "+";
            position: absolute;
            font-size: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo-text {
            font-weight: bold;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .login-form {
            text-align: left;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form label {
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
        }

        .login-form input {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 12px;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .login-options label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #7f8c8d;
            cursor: pointer;
            margin: 0;
        }

        .login-options a {
            color: #7f8c8d;
            text-decoration: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #5c8dff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .saco-label {
            position: absolute;
            top: 20px;
            left: 30px;
            color: white;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1.2rem;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="saco-label">S.A.C.O</div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-icon">🦷</div>
            <div class="logo-text">Logomarca</div>
        </div>

        <form class="login-form">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" class="form-control" placeholder="Insira seu usuário">
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="Insira sua senha">
            </div>

            <div class="login-options">
                <label>
                    <input type="checkbox"> Lembre-se de mim
                </label>
                <a href="#">Esqueci minha senha ></a>
            </div>

            <button type="submit" class="btn-login"> <a href="pacientes.html">Entrar ></a></button>
        </form>
    </div>
</body>
</html>
